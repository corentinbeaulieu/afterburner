# Fogburn — International Orange (Aerospace), light variant
# Place in ~/.config/kitty/themes/fogburn.conf
# Load with: include themes/fogburn.conf
# Or select via: kitten themes

background            #F5F0EB
foreground            #2A2218
cursor                #A33200
cursor_text_color     #F5F0EB
selection_background  #EDE5DC
selection_foreground  #2A2218
url_color             #2A6A9A

# Normal (0–7)
color0   #EDE5DC
color1   #BA160C
color2   #2E7D4F
color3   #9A6A10
color4   #2A6A9A
color5   #7058C0
color6   #2D8C7A
color7   #5A5248

# Bright (8–15)
color8   #9A9088
color9   #D4352A
color10  #3E9E64
color11  #C94000
color12  #3A7AB5
color13  #D45A00
color14  #B87040
color15  #2A2218

# Tab bar
active_tab_foreground   #C94000
active_tab_background   #F5F0EB
inactive_tab_foreground #9A9088
inactive_tab_background #EDE5DC
tab_bar_background      #EDE5DC

# Marks
mark1_foreground #F5F0EB
mark1_background #C94000
mark2_foreground #F5F0EB
mark2_background #D45A00
mark3_foreground #F5F0EB
mark3_background #A33200
