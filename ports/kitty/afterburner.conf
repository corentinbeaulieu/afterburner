# Afterburner — International Orange (Aerospace), dark variant
# Place in ~/.config/kitty/themes/afterburner.conf
# Load with: include themes/afterburner.conf
# Or select via: kitten themes

background            #0D0D0D
foreground            #E0E0E0
cursor                #CC3F00
cursor_text_color     #0D0D0D
selection_background  #2A1500
selection_foreground  #E0E0E0
url_color             #4A8AB5

# Normal (0–7)
color0   #1A1A1A
color1   #BA160C
color2   #5FBF7E
color3   #E09B30
color4   #4A8AB5
color5   #A07DE0
color6   #4DBFA8
color7   #C0C0C0

# Bright (8–15)
color8   #333333
color9   #E8352A
color10  #7DDBA0
color11  #FF4F00
color12  #8DCAEE
color13  #FF7A33
color14  #FFB380
color15  #FFFFFF

# Tab bar
active_tab_foreground   #FF4F00
active_tab_background   #1A1A1A
inactive_tab_foreground #444444
inactive_tab_background #0D0D0D
tab_bar_background      #0D0D0D

# Marks
mark1_foreground #0D0D0D
mark1_background #FF4F00
mark2_foreground #0D0D0D
mark2_background #FF7A33
mark3_foreground #0D0D0D
mark3_background #CC3F00
